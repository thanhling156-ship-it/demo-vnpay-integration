server:
  port: 7002

spring:
  application:
    name: vnpay-hub
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: vnpay-hub-group
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.example.event_library"
    # Nếu Repo có bắn trả lại RepoStatusEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  datasource:
    url: jdbc:postgresql://localhost:5041/transaction_db
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vnpay:
  pay-url: "${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}" # pay-url + ? + queryString
  return-url: "${VNPAY_RETURN_URL:http://localhost:8080/api/v1/vnpay-callback}" # Trang thông báo kết quả
  tmn-code: "${VNPAY_TMN_CODE:9LQMF1A6}"
  hash-secret: "${VNPAY_HASH_SECRET:VS2XF12B1XWPXT8JUJ1C3S4RJG366NRT}"